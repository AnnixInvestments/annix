<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Annix Orbit">
  <title>Annix Orbit</title>

  <!-- Navy background tile (favicons render against any tab colour, give them a frame) -->
  <rect x="0" y="0" width="64" height="64" rx="12" fill="#001B8F"/>

  <!-- Orbital ring -->
  <circle cx="32" cy="32" r="24" fill="none" stroke="#FF8A00" stroke-width="2.5" opacity="0.85"/>

  <!-- Simplified A — single triangle stroke + crossbar -->
  <g stroke="#FF8A00" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <line x1="25" y1="14" x2="15" y2="46"/>
    <line x1="25" y1="14" x2="35" y2="46"/>
    <line x1="20" y1="35" x2="30" y2="35" stroke-width="3"/>
  </g>

  <!-- Simplified N — two verticals + diagonal -->
  <g stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <line x1="37" y1="14" x2="37" y2="46"/>
    <line x1="37" y1="14" x2="49" y2="46"/>
    <line x1="49" y1="14" x2="49" y2="46"/>
  </g>

  <!-- Bright orbital particle (top right) -->
  <circle cx="53" cy="14" r="3" fill="#FFA500"/>
</svg>
