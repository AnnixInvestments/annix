<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Verification Failed - ASCA Stock Control</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: #f3f4f6;
      min-height: 100vh;
      padding: 32px 16px;
    }
    .container {
      max-width: 400px;
      margin: 0 auto;
      text-align: center;
    }
    .logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background-color: #0d9488;
      margin-bottom: 16px;
    }
    .logo svg {
      width: 32px;
      height: 32px;
      color: white;
    }
    h1 {
      font-size: 24px;
      font-weight: bold;
      color: #111827;
      margin-bottom: 32px;
    }
    .card {
      background: white;
      border-radius: 8px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      padding: 32px;
    }
    .error-icon {
      width: 64px;
      height: 64px;
      background-color: #fee2e2;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
    }
    .error-icon svg {
      width: 32px;
      height: 32px;
      color: #dc2626;
    }
    .card h2 {
      font-size: 20px;
      font-weight: bold;
      color: #111827;
      margin-bottom: 8px;
    }
    .card p {
      color: #4b5563;
      margin-bottom: 24px;
    }
    .button {
      display: block;
      width: 100%;
      padding: 16px;
      background-color: #0d9488;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-size: 18px;
      font-weight: bold;
      text-align: center;
    }
    .button:hover {
      background-color: #0f766e;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
      </svg>
    </div>
    <h1>ASCA Stock Control</h1>

    <div class="card">
      <div class="error-icon">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </div>
      <h2>Verification Failed</h2>
      <p>The verification link is invalid or has expired. Please request a new verification email.</p>
      <a href="/stock-control/lite/login" class="button">Go to Sign In</a>
    </div>
  </div>
</body>
</html>
