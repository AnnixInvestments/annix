<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2400 3000" width="2400" height="3000" role="img" aria-label="Annix Orbit — Hiring, Talent, Compliance">
  <title>Annix Orbit — Hiring, Talent, Compliance</title>
  <desc>Full Annix Orbit brand lockup: orbital AN monogram above the ANNIX wordmark with ORBIT eyebrow, HIRING • TALENT • COMPLIANCE subtitle, and tagline.</desc>

  <defs>
    <radialGradient id="aoGlowDot" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE8B8"/>
      <stop offset="35%" stop-color="#FFA500"/>
      <stop offset="100%" stop-color="#FF8A00"/>
    </radialGradient>
    <radialGradient id="aoSideDot" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFA500"/>
      <stop offset="100%" stop-color="#FF8A00"/>
    </radialGradient>
    <linearGradient id="aoBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#001B8F"/>
      <stop offset="100%" stop-color="#00135F"/>
    </linearGradient>
    <filter id="aoGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="22" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Navy gradient background — toggle via the React component's `transparent` prop -->
  <rect x="0" y="0" width="2400" height="3000" fill="url(#aoBg)"/>

  <!-- ─── Icon block: centred horizontally, occupies the top 1900 px ─────────── -->
  <g transform="translate(200, 60)">
    <!-- Orbital ring -->
    <circle cx="1000" cy="1000" r="860" fill="none" stroke="#FF8A00" stroke-width="32" opacity="0.85"/>

    <!-- Orange A -->
    <g stroke="#FF8A00" stroke-width="140" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="830" y1="340" x2="490" y2="1640"/>
      <line x1="830" y1="340" x2="1170" y2="1640"/>
      <line x1="680" y1="1170" x2="980" y2="1170" stroke-width="100"/>
    </g>

    <!-- White N -->
    <g stroke="#FFFFFF" stroke-width="130" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="1270" y1="380" x2="1270" y2="1640"/>
      <line x1="1270" y1="380" x2="1700" y2="1640"/>
      <line x1="1700" y1="380" x2="1700" y2="1640"/>
    </g>

    <!-- Glowing particle (top right) -->
    <circle cx="1820" cy="360" r="75" fill="url(#aoGlowDot)" filter="url(#aoGlow)"/>

    <!-- Smaller particle (bottom left) -->
    <circle cx="180" cy="1680" r="55" fill="url(#aoSideDot)"/>
  </g>

  <!-- ─── Wordmark block: ANNIX large, ORBIT eyebrow with rules ─────────────── -->
  <g font-family="'Exo 2', 'Inter', system-ui, sans-serif" text-anchor="middle">
    <!-- ANNIX (Exo 2 ExtraBold; falls back to system bold if Exo 2 isn't loaded) -->
    <text x="1200" y="2240" font-weight="800" font-size="320" letter-spacing="48" fill="#FFFFFF">ANNIX</text>

    <!-- Orange rules either side of ORBIT -->
    <line x1="540" y1="2360" x2="900" y2="2360" stroke="#FF8A00" stroke-width="6" opacity="0.7"/>
    <line x1="1500" y1="2360" x2="1860" y2="2360" stroke="#FF8A00" stroke-width="6" opacity="0.7"/>

    <!-- ORBIT (wide tracking) -->
    <text x="1200" y="2440" font-weight="700" font-size="200" letter-spacing="120" fill="#FF8A00">ORBIT</text>
  </g>

  <!-- ─── Subtitle: HIRING • TALENT • COMPLIANCE ─────────────────────────────── -->
  <g font-family="'Inter', 'Exo 2', system-ui, sans-serif" text-anchor="middle">
    <text x="1200" y="2620" font-weight="600" font-size="90" letter-spacing="60" fill="#E8EDF5">
      HIRING <tspan fill="#FF8A00">•</tspan> TALENT <tspan fill="#FF8A00">•</tspan> COMPLIANCE
    </text>
  </g>

  <!-- Thin orange separator -->
  <line x1="700" y1="2700" x2="1700" y2="2700" stroke="#FF8A00" stroke-width="3" opacity="0.45"/>

  <!-- ─── Tagline ────────────────────────────────────────────────────────────── -->
  <g font-family="'Inter', system-ui, sans-serif" text-anchor="middle" fill="#A7B0C0">
    <text x="1200" y="2820" font-weight="400" font-size="76">The intelligent workforce ecosystem for modern hiring,</text>
    <text x="1200" y="2910" font-weight="400" font-size="76">talent growth, and compliance.</text>
  </g>
</svg>
