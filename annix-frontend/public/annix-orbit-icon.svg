<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2000 2000" width="2000" height="2000" role="img" aria-label="Annix Orbit">
  <title>Annix Orbit</title>

  <defs>
    <radialGradient id="aoGlowDot" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE8B8"/>
      <stop offset="35%" stop-color="#FFA500"/>
      <stop offset="100%" stop-color="#FF8A00"/>
    </radialGradient>
    <radialGradient id="aoSideDot" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFA500"/>
      <stop offset="100%" stop-color="#FF8A00"/>
    </radialGradient>
    <filter id="aoGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Orbital ring -->
  <circle cx="1000" cy="1000" r="860" fill="none" stroke="#FF8A00" stroke-width="32" opacity="0.85"/>

  <!-- Orange A — three stroked segments forming the angular monogram letter -->
  <g stroke="#FF8A00" stroke-width="140" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <line x1="830" y1="340" x2="490" y2="1640"/>
    <line x1="830" y1="340" x2="1170" y2="1640"/>
    <line x1="680" y1="1170" x2="980" y2="1170" stroke-width="100"/>
  </g>

  <!-- White N — two verticals + diagonal, sits to the right of the A so both letters read -->
  <g stroke="#FFFFFF" stroke-width="130" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <line x1="1270" y1="380" x2="1270" y2="1640"/>
    <line x1="1270" y1="380" x2="1700" y2="1640"/>
    <line x1="1700" y1="380" x2="1700" y2="1640"/>
  </g>

  <!-- Bright orbiting particle (top right) — main visual anchor, suggests motion -->
  <circle cx="1820" cy="360" r="75" fill="url(#aoGlowDot)" filter="url(#aoGlow)"/>

  <!-- Smaller particle (bottom left) — balances the composition -->
  <circle cx="180" cy="1680" r="55" fill="url(#aoSideDot)"/>
</svg>
