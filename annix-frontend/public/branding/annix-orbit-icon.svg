<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2000 2000" width="2000" height="2000" role="img" aria-label="Annix Orbit">
  <title>Annix Orbit</title>
  <desc>Orbital AN monogram — slender orange A on the left with a comet-tail swoosh arcing toward the bright top-right satellite, slender white N on the right, both sitting inside a thin orange orbital ring. A small deep-orange satellite balances the composition at the bottom-left of the ring.</desc>
  <defs>
    <radialGradient id="ao-particle-bright" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFF0CC"/>
      <stop offset="35%" stop-color="#FFA500"/>
      <stop offset="100%" stop-color="#FF8A00"/>
    </radialGradient>
    <filter id="ao-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="22" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Orbit ring (orange, BEHIND A) — radius 760 so the AN can sit inside with breathing room. -->
  <circle cx="1000" cy="1000" r="760" fill="none" stroke="#FF8A00" stroke-width="36"/>

  <!-- ORANGE A — slender blade letterform, centered around x=700. -->
  <path d="M 700 380
           L 540 1640
           L 640 1640
           L 680 1330
           L 820 1330
           L 860 1640
           L 960 1640
           L 740 380 Z
           M 700 1180
           L 820 1180
           L 760 740 Z"
        fill="#FF8A00" fill-rule="evenodd"/>

  <!-- Orange swoosh / comet tail — filled crescent from the A's apex
       arcing up and right toward the bright satellite. -->
  <path d="M 740 380
           C 950 240, 1280 240, 1480 380
           C 1580 460, 1620 540, 1600 600
           C 1500 540, 1380 520, 1260 540
           C 1100 580, 920 620, 780 580
           C 720 540, 700 460, 740 380 Z"
        fill="#FF8A00"/>

  <!-- WHITE N — slender block letterform, two verticals + diagonal going
       top-left to bottom-right (standard N direction). -->
  <path d="M 1100 380
           L 1220 380
           L 1440 1370
           L 1440 380
           L 1560 380
           L 1560 1640
           L 1440 1640
           L 1220 650
           L 1220 1640
           L 1100 1640 Z"
        fill="#FFFFFF"/>

  <!-- Orbit ARC re-drawn ON TOP of the N so the ring visibly crosses it. -->
  <path d="M 1672 540 A 760 760 0 0 1 1672 1460"
        fill="none" stroke="#FF8A00" stroke-width="36"/>

  <!-- Bright top-right satellite with glow halo, anchoring swoosh end. -->
  <circle cx="1580" cy="420" r="62" fill="url(#ao-particle-bright)" filter="url(#ao-glow)"/>

  <!-- Small deep-orange satellite at bottom-left of orbit. -->
  <circle cx="420" cy="1580" r="42" fill="#FF8A00"/>
</svg>
