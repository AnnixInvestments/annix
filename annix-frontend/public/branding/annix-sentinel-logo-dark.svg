<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2400 3000" width="2400" height="3000" role="img" aria-label="Annix Sentinel — AI-Powered Compliance & Risk Intelligence">
  <title>Annix Sentinel — AI-Powered Compliance &amp; Risk Intelligence</title>
  <desc>Full Annix Sentinel brand lockup on the deep-navy palette: orbital AN monogram in a blue orbit ring, ANNIX wordmark (Exo 2 ExtraBold, white) above the SENTINEL eyebrow (Exo 2 SemiBold, blue, flanked by blue rules), the AI-POWERED COMPLIANCE &amp; RISK INTELLIGENCE tagline, and the MONITOR • PROTECT • PREVENT • EMPOWER pillar row.</desc>

  <defs>
    <radialGradient id="as-logo-particle-bright" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFF0CC"/>
      <stop offset="35%" stop-color="#FFA500"/>
      <stop offset="100%" stop-color="#FF8A00"/>
    </radialGradient>
    <linearGradient id="as-logo-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0A1B3D"/>
      <stop offset="100%" stop-color="#06101f"/>
    </linearGradient>
    <filter id="as-logo-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="22" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="2400" height="3000" fill="url(#as-logo-bg)"/>

  <!-- ─── Orbital AN monogram ─── -->
  <g transform="translate(200, 60)">
    <circle cx="1000" cy="1000" r="800" fill="none" stroke="#1E90FF" stroke-width="32" opacity="0.95"/>

    <!-- Dashed blue scanning arc on the left -->
    <path d="M 280 1320 A 800 800 0 0 1 320 600"
          fill="none" stroke="#1E90FF" stroke-width="16" stroke-dasharray="8 50" stroke-linecap="round" opacity="0.65"/>

    <!-- Orange A -->
    <path d="M 900 240
             L 580 1740
             L 760 1740
             L 820 1450
             L 1080 1450
             L 1140 1740
             L 1320 1740
             L 1000 240 Z
             M 850 1280
             L 1050 1280
             L 950 800 Z"
          fill="#FF8A00" fill-rule="evenodd"/>

    <!-- White N -->
    <path d="M 1380 280
             L 1580 280
             L 1580 920
             L 1780 280
             L 1980 280
             L 1980 1740
             L 1780 1740
             L 1780 1100
             L 1580 1740
             L 1380 1740 Z"
          fill="#FFFFFF"/>

    <!-- Orbit arc crossing the N -->
    <path d="M 1700 380 A 800 800 0 0 1 1700 1620" fill="none" stroke="#1E90FF" stroke-width="32" opacity="0.95"/>

    <!-- Bright top-right satellite -->
    <circle cx="1580" cy="420" r="62" fill="url(#as-logo-particle-bright)" filter="url(#as-logo-glow)"/>

    <!-- Small blue satellite bottom-left -->
    <circle cx="360" cy="1620" r="44" fill="#1E90FF"/>
  </g>

  <!-- ─── ANNIX wordmark (Exo 2 ExtraBold, white, tracking +12) with orange X right-diagonal ─── -->
  <g font-family="'Exo 2', 'Inter', system-ui, sans-serif" text-anchor="middle">
    <text x="1200" y="2160" font-weight="800" font-size="320" letter-spacing="38" fill="#FFFFFF">ANNIX</text>

    <g opacity="0.95">
      <clipPath id="as-logo-x-right">
        <polygon points="1500,1990 1640,1990 1720,2160 1580,2160 1500,1990 1580,2160 1700,2160 1620,1990"/>
      </clipPath>
      <rect x="1450" y="1960" width="320" height="220" fill="#FF8A00" clip-path="url(#as-logo-x-right)"/>
    </g>

    <!-- Blue rules either side of SENTINEL -->
    <line x1="430" y1="2310" x2="800" y2="2310" stroke="#1E90FF" stroke-width="6" opacity="0.9"/>
    <line x1="1600" y1="2310" x2="1970" y2="2310" stroke="#1E90FF" stroke-width="6" opacity="0.9"/>

    <!-- SENTINEL eyebrow — Exo 2 SemiBold, blue, letter-spacing +8 widened -->
    <text x="1200" y="2410" font-weight="600" font-size="228" letter-spacing="96" fill="#1E90FF">SENTINEL</text>
  </g>

  <!-- ─── Tagline (Inter Medium, white 85%) ─── -->
  <g font-family="'Inter', system-ui, sans-serif" text-anchor="middle">
    <text x="1200" y="2600" font-weight="500" font-size="78" letter-spacing="6" fill="rgba(255,255,255,0.85)">AI-POWERED COMPLIANCE &amp; RISK INTELLIGENCE</text>
  </g>

  <!-- ─── Pillar row: MONITOR • PROTECT • PREVENT • EMPOWER ─── -->
  <g font-family="'Inter', system-ui, sans-serif" text-anchor="middle">
    <text x="1200" y="2740" font-weight="500" font-size="74" letter-spacing="28" fill="rgba(255,255,255,0.80)">
      MONITOR <tspan fill="#1E90FF">&#x2022;</tspan> PROTECT <tspan fill="#FF8A00">&#x2022;</tspan> PREVENT <tspan fill="#1E90FF">&#x2022;</tspan> EMPOWER
    </text>
  </g>

  <line x1="700" y1="2820" x2="1700" y2="2820" stroke="#1E90FF" stroke-width="3" opacity="0.45"/>

  <!-- ─── Description (Inter Regular, white 70%) ─── -->
  <g font-family="'Inter', system-ui, sans-serif" text-anchor="middle" fill="rgba(255,255,255,0.70)">
    <text x="1200" y="2930" font-weight="400" font-size="66">Your AI-powered compliance operating system that monitors,</text>
    <text x="1200" y="3010" font-weight="400" font-size="66">protects, and strengthens your business against risk.</text>
  </g>
</svg>
