app = 'annix-app'
primary_region = 'jnb'

[build]

[deploy]
  release_command = 'sh -c "cd annix-backend && node -r ts-node/register/transpile-only ./scripts/check-required-secrets.ts && ( ALLOW_PRODUCTION=true node -r ts-node/register/transpile-only ./scripts/drop-empty-collections.ts --apply --allow-production --near-cap-only || echo empty-collection-cleanup-skipped ) && node -r ts-node/register/transpile-only ./node_modules/migrate-mongo/bin/migrate-mongo.js up -f migrate-mongo-config.ts && if [ x$ORBIT_MONGODB_URI != x ] || [ x$ORBIT_MONGO_DATABASE != x ]; then ( ALLOW_PRODUCTION=true node -r ts-node/register/transpile-only ./scripts/drop-empty-collections.ts --orbit --apply --allow-production --near-cap-only || echo orbit-empty-collection-cleanup-skipped ) && node -r ts-node/register/transpile-only ./node_modules/migrate-mongo/bin/migrate-mongo.js up -f migrate-mongo-orbit-config.ts; fi"'
  release_command_timeout = '40m'

[deploy.release_command_machine]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  kill_timeout = '300s'

[env]
  NODE_ENV = 'production'
  PORT = '4000'
  FRONTEND_URL = 'https://annix-app.fly.dev'
  NEXT_PUBLIC_API_URL = '/api'
  NEXT_PUBLIC_GOOGLE_MAPS_API_KEY = '__NEXT_PUBLIC_GOOGLE_MAPS_API_KEY__'

[http_service]
  internal_port = 4000
  force_https = false
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 50
    soft_limit = 25

  [http_service.http_options]
    idle_timeout = 300

[checks]
  [checks.health]
    grace_period = '30s'
    interval = '30s'
    method = 'GET'
    path = '/health'
    port = 4000
    timeout = '10s'
    type = 'http'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  kill_timeout = '120s'
