<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Annix Investments — Coming Soon</title>
    <meta
      name="description"
      content="Annix Investments — a South African technology holding company building intelligent software for business. Website coming soon."
    />
    <link rel="icon" href="logo.png" />
    <style>
      :root {
        --navy: #0d0d2b;
        --navy-2: #1a1a40;
        --orange: #f5821f;
        --text: #eef0ff;
        --muted: #a9add6;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial,
          sans-serif;
        color: var(--text);
        background: radial-gradient(1200px 600px at 50% -10%, var(--navy-2), var(--navy) 60%);
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 24px;
      }
      .card {
        max-width: 560px;
        width: 100%;
      }
      .logo {
        width: min(260px, 70vw);
        height: auto;
        margin: 0 auto 28px;
        display: block;
      }
      h1 {
        font-size: clamp(1.6rem, 4vw, 2.4rem);
        letter-spacing: 0.02em;
        margin: 0 0 10px;
      }
      .rule {
        width: 64px;
        height: 3px;
        background: var(--orange);
        border-radius: 3px;
        margin: 18px auto 22px;
      }
      p {
        color: var(--muted);
        font-size: clamp(1rem, 2.4vw, 1.1rem);
        line-height: 1.6;
        margin: 0 auto 26px;
        max-width: 460px;
      }
      .contact {
        display: inline-block;
        color: var(--text);
        text-decoration: none;
        border: 1px solid rgba(245, 130, 31, 0.5);
        padding: 11px 20px;
        border-radius: 10px;
        font-weight: 600;
        transition: background 0.18s ease, border-color 0.18s ease;
      }
      .contact:hover {
        background: rgba(245, 130, 31, 0.12);
        border-color: var(--orange);
      }
      footer {
        margin-top: 40px;
        color: rgba(169, 173, 214, 0.7);
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <img class="logo" src="logo.png" alt="Annix Investments" />
      <h1>Something intelligent is on the way</h1>
      <div class="rule"></div>
      <p>
        Annix Investments is a South African technology holding company building intelligent
        software for business. Our new home is under construction.
      </p>
      <a class="contact" href="mailto:info@annix.co.za">info@annix.co.za</a>
      <footer>&copy; Annix Investments</footer>
    </main>
  </body>
</html>
