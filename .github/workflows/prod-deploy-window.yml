name: Prod Deploy Window

# The prod environment has a required-reviewer gate, so push-triggered deploys
# build + test immediately but hold the prod deploy at "Waiting for review".
# This workflow releases that gate on a schedule: it approves the NEWEST
# waiting deploy run (one prod deploy per night, latest code) and cancels any
# older runs it superseded.
#
# Bypass options, any time:
#   1. GitHub UI -> the waiting run -> "Review deployments" -> approve prod
#   2. Actions -> "Prod Deploy Window" -> "Run workflow" (releases it now)
#   3. gh workflow run prod-deploy-window.yml

on:
  schedule:
    - cron: "0 1 * * *" # 03:00 South Africa (UTC+2, no DST)
  workflow_dispatch:

permissions: {}

jobs:
  release-gate:
    name: Approve newest waiting prod deploy
    runs-on: ubuntu-latest
    steps:
      - name: Approve newest, cancel stale
        env:
          # PAT of a prod required reviewer — the workflow GITHUB_TOKEN cannot
          # approve environment deployments.
          GH_TOKEN: ${{ secrets.DEPLOY_APPROVER_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::DEPLOY_APPROVER_TOKEN secret is not set. Create a PAT (repo scope) for a prod required reviewer and add it: gh secret set DEPLOY_APPROVER_TOKEN"
            exit 1
          fi

          WAITING=$(gh api "repos/$REPO/actions/workflows/deploy.yml/runs?status=waiting&per_page=50" \
            --jq '[.workflow_runs[] | {id, created_at, head_sha}] | sort_by(.created_at) | reverse')
          COUNT=$(echo "$WAITING" | jq length)
          if [ "$COUNT" -eq 0 ]; then
            echo "No deploy runs waiting on the prod gate — nothing to do."
            exit 0
          fi

          NEWEST=$(echo "$WAITING" | jq -r '.[0].id')
          NEWEST_SHA=$(echo "$WAITING" | jq -r '.[0].head_sha' | cut -c1-9)

          ENV_IDS=$(gh api "repos/$REPO/actions/runs/$NEWEST/pending_deployments" \
            --jq '[.[] | select(.environment.name == "prod" and .current_user_can_approve) | .environment.id]')
          if [ "$(echo "$ENV_IDS" | jq length)" -eq 0 ]; then
            echo "Newest waiting run $NEWEST has no approvable prod deployment — skipping approve."
          else
            jq -n --argjson ids "$ENV_IDS" \
              '{environment_ids: $ids, state: "approved", comment: "Released by the 03:00 prod deploy window"}' \
              | gh api -X POST "repos/$REPO/actions/runs/$NEWEST/pending_deployments" --input - > /dev/null
            echo "Approved prod deployment for run $NEWEST ($NEWEST_SHA)."
          fi

          echo "$WAITING" | jq -r '.[1:][] | .id' | while read -r STALE; do
            [ -z "$STALE" ] && continue
            echo "Cancelling stale waiting run $STALE (superseded by $NEWEST)."
            gh api -X POST "repos/$REPO/actions/runs/$STALE/cancel" > /dev/null || true
          done
