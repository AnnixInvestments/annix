name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to implement"
        required: true
        type: string
      prompt:
        description: "Instructions for Claude (default: implement the issue)"
        required: false
        type: string
        default: ""

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  claude:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Add eyes reaction
        if: github.event_name == 'issue_comment'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -f content=eyes --silent || true

      - name: Add eyes reaction to issue
        if: github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/reactions \
            -f content=eyes --silent || true

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch issue details
        if: github.event_name == 'workflow_dispatch'
        id: issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE_JSON=$(gh issue view ${{ inputs.issue_number }} --repo ${{ github.repository }} --json title,body)
          TITLE=$(echo "$ISSUE_JSON" | jq -r '.title')
          BODY=$(echo "$ISSUE_JSON" | jq -r '.body')
          {
            echo "title<<ISSUE_EOF"
            echo "$TITLE"
            echo "ISSUE_EOF"
            echo "body<<BODY_EOF"
            echo "$BODY"
            echo "BODY_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Detect feedback issue
        id: feedback-check
        if: github.event_name == 'issues' || github.event_name == 'issue_comment'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE_NUM=""
          if [ "${{ github.event_name }}" = "issues" ]; then
            ISSUE_NUM="${{ github.event.issue.number }}"
          elif [ "${{ github.event_name }}" = "issue_comment" ]; then
            ISSUE_NUM="${{ github.event.issue.number }}"
          fi

          if [ -n "$ISSUE_NUM" ]; then
            LABELS=$(gh issue view "$ISSUE_NUM" --repo "${{ github.repository }}" --json labels -q '.labels[].name' 2>/dev/null || echo "")
            if echo "$LABELS" | grep -q "feedback"; then
              echo "is_feedback=true" >> "$GITHUB_OUTPUT"
              CONTEXT=$(cat .github/FEEDBACK_CONTEXT.md 2>/dev/null || echo "")
              {
                echo "context<<CONTEXT_EOF"
                echo "$CONTEXT"
                echo "CONTEXT_EOF"
              } >> "$GITHUB_OUTPUT"
            else
              echo "is_feedback=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "is_feedback=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Claude Code (feedback issue — investigate only)
        if: |
          github.event_name != 'workflow_dispatch' &&
          steps.feedback-check.outputs.is_feedback == 'true'
        id: claude-feedback
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.PROJECT_TOKEN }}
          claude_args: "--allowedTools Bash,Read,Glob,Grep,LS,WebFetch,WebSearch"
          prompt: |
            You are operating autonomously on a feedback issue auto-created from user submissions.
            Your role is INVESTIGATION ONLY — you must NOT make any code changes, create branches, or open PRs.

            Read the CLAUDE.md file for project conventions.

            IMPORTANT FEEDBACK CONTEXT:
            ${{ steps.feedback-check.outputs.context }}

            This issue was auto-created from user feedback. The issue body/comment contains:
            - Submitter details and which app they were using
            - The page URL where the problem occurred
            - Screenshots showing the current state of the page
            - AI classification of the feedback type

            STRICT RULES:
            - DO NOT edit any files, create branches, or open PRs
            - DO NOT run biome, tests, or any build commands
            - You are read-only — investigation and reporting ONLY

            Your task:
            1. Read the feedback content and examine any screenshots in the issue/comment
            2. Use the app context and page URL to locate the relevant code files
            3. Investigate the root cause thoroughly — read the relevant components, services, and related code
            4. Identify the exact files and line numbers involved
            5. Determine what the fix should be (describe it, don't implement it)

            MANDATORY: Post a detailed investigation comment on this issue using `gh issue comment`. The comment MUST include ALL of the following sections:

            ## Investigation Summary
            - **Feedback**: One-line summary of what the user reported
            - **App**: Which app context (stock-control, au-rubber, etc.)
            - **Page**: The page URL and which component it maps to
            - **Classification**: bug / ui-issue / data-issue / feature-request / question

            ## Root Cause
            Detailed explanation of what is causing the issue. Include:
            - The exact file paths and line numbers where the problem originates
            - Code snippets showing the problematic logic (use code blocks)
            - Why the current behavior differs from expected behavior

            ## Recommended Fix
            Step-by-step description of what needs to change:
            - Which files need to be modified
            - What the change should be (describe the logic, show before/after pseudocode if helpful)
            - Any related files that may need updates (types, tests, imports)
            - Estimated complexity: trivial / small / medium / large

            ## Risk Assessment
            - What could go wrong with the fix
            - Any related features that could be affected
            - Whether a migration or data update is needed

            Never finish silently — the developer will use this comment to implement the fix via CLI.

      - name: Report investigation failure
        if: |
          github.event_name != 'workflow_dispatch' &&
          steps.feedback-check.outputs.is_feedback == 'true' &&
          failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE_NUM=""
          if [ "${{ github.event_name }}" = "issues" ]; then
            ISSUE_NUM="${{ github.event.issue.number }}"
          elif [ "${{ github.event_name }}" = "issue_comment" ]; then
            ISSUE_NUM="${{ github.event.issue.number }}"
          fi

          if [ -n "$ISSUE_NUM" ]; then
            gh issue comment "$ISSUE_NUM" --repo "${{ github.repository }}" --body "$(cat <<'COMMENT_EOF'
          ## Investigation Failed

          The Claude Code workflow encountered an error while investigating this feedback.
          A developer will need to investigate manually.

          **Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMENT_EOF
          )"
          fi

      - name: Run Claude Code (event triggered)
        if: |
          github.event_name != 'workflow_dispatch' &&
          steps.feedback-check.outputs.is_feedback != 'true'
        id: claude-event
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.PROJECT_TOKEN }}
          claude_args: "--allowedTools Bash,Read,Edit,MultiEdit,Write,Glob,Grep,LS,WebFetch,WebSearch,TodoRead,TodoWrite,Task"
          prompt: |
            Read the CLAUDE.md and agents.md files for project conventions. Follow all existing patterns.

            CRITICAL: Before committing, you MUST run these checks and fix any failures:
            1. `npx biome check --write --unsafe .` (Biome lint/format — use --write to auto-fix)
            2. `pnpm test:all` (backend tests + frontend type-check)
            3. After fixing, run `npx biome check .` again to verify zero errors remain
            Do NOT commit or push code that fails these checks. If biome reports errors after --write, manually fix them.

      - name: Run Claude Code (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        id: claude-dispatch
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.PROJECT_TOKEN }}
          claude_args: "--allowedTools Bash,Read,Edit,MultiEdit,Write,Glob,Grep,LS,WebFetch,WebSearch,TodoRead,TodoWrite,Task"
          prompt: |
            You are operating autonomously. Do NOT ask questions or request clarification. Make all implementation decisions yourself based on the codebase, existing patterns, and the issue description. If something is ambiguous, pick the most reasonable approach and proceed.

            Read the CLAUDE.md and agents.md files for project conventions. Follow all existing patterns.

            CRITICAL: Before committing, you MUST run these checks and fix any failures:
            1. `npx biome check --write --unsafe .` (Biome lint/format — use --write to auto-fix)
            2. `pnpm test:all` (backend tests + frontend type-check)
            3. After fixing, run `npx biome check .` again to verify zero errors remain
            Do NOT commit or push code that fails these checks. If biome reports errors after --write, manually fix them.

            Your task: implement the following GitHub issue. Create a feature branch, implement all changes, commit, push, and open a PR referencing issue #${{ inputs.issue_number }}.

            ${{ inputs.prompt }}

            ## Issue #${{ inputs.issue_number }}: ${{ steps.issue.outputs.title }}

            ${{ steps.issue.outputs.body }}
