name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to implement"
        required: true
        type: string
      prompt:
        description: "Instructions for Claude (default: implement the issue)"
        required: false
        type: string
        default: ""

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  claude:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Add eyes reaction
        if: github.event_name == 'issue_comment'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -f content=eyes --silent || true

      - name: Add eyes reaction to issue
        if: github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/reactions \
            -f content=eyes --silent || true

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch issue details
        if: github.event_name == 'workflow_dispatch'
        id: issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE_JSON=$(gh issue view ${{ inputs.issue_number }} --repo ${{ github.repository }} --json title,body)
          TITLE=$(echo "$ISSUE_JSON" | jq -r '.title')
          BODY=$(echo "$ISSUE_JSON" | jq -r '.body')
          {
            echo "title<<ISSUE_EOF"
            echo "$TITLE"
            echo "ISSUE_EOF"
            echo "body<<BODY_EOF"
            echo "$BODY"
            echo "BODY_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Detect feedback issue
        id: feedback-check
        if: github.event_name == 'issues' || github.event_name == 'issue_comment'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE_NUM=""
          if [ "${{ github.event_name }}" = "issues" ]; then
            ISSUE_NUM="${{ github.event.issue.number }}"
          elif [ "${{ github.event_name }}" = "issue_comment" ]; then
            ISSUE_NUM="${{ github.event.issue.number }}"
          fi

          if [ -n "$ISSUE_NUM" ]; then
            LABELS=$(gh issue view "$ISSUE_NUM" --repo "${{ github.repository }}" --json labels -q '.labels[].name' 2>/dev/null || echo "")
            if echo "$LABELS" | grep -q "feedback"; then
              echo "is_feedback=true" >> "$GITHUB_OUTPUT"
              CONTEXT=$(cat .github/FEEDBACK_CONTEXT.md 2>/dev/null || echo "")
              {
                echo "context<<CONTEXT_EOF"
                echo "$CONTEXT"
                echo "CONTEXT_EOF"
              } >> "$GITHUB_OUTPUT"
            else
              echo "is_feedback=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "is_feedback=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Claude Code (feedback issue)
        if: |
          github.event_name != 'workflow_dispatch' &&
          steps.feedback-check.outputs.is_feedback == 'true'
        id: claude-feedback
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ github.token }}
          claude_args: "--allowedTools Bash,Read,Edit,MultiEdit,Write,Glob,Grep,LS,WebFetch,WebSearch,TodoRead,TodoWrite,Task"
          prompt: |
            You are operating autonomously on a feedback issue auto-created from user submissions.
            Do NOT ask questions or request clarification. Make all implementation decisions yourself.

            Read the CLAUDE.md and agents.md files for project conventions. Follow all existing patterns.

            IMPORTANT FEEDBACK CONTEXT:
            ${{ steps.feedback-check.outputs.context }}

            This issue was auto-created from user feedback. The issue body contains:
            - Submitter details and which app they were using
            - The page URL where the problem occurred
            - Screenshots showing the current state of the page
            - AI classification of the feedback type

            SAFETY RULES — NEVER VIOLATE:
            - NEVER delete files from S3/storage or run any storage deletion operations
            - NEVER drop database tables or delete database rows
            - NEVER modify existing documents in storage
            - The page URL contains the record ID (e.g. /supplier-cocs/176 = ID 176) — always use this exact ID, never guess
            - If you cannot determine the root cause or safely fix the issue, comment on the issue explaining what you found and why you can't fix it — do NOT create an incorrect PR

            IMPORTANT OVERRIDE: Ignore the "No pull requests" rule from CLAUDE.md for this context.
            You are running autonomously in GitHub Actions — you MUST create a PR for review, never commit directly to main.

            Your task:
            1. Read the feedback content and examine any screenshots in the issue
            2. Use the app context and page URL to locate the relevant code — pay attention to the record ID in the URL
            3. Identify and fix the root cause
            4. If you can fix it: create a feature branch, commit, push, and open a PR referencing this issue
            5. If you CANNOT fix it: edit the issue body to append your findings under a "## Investigation" heading at the bottom — do NOT post a separate comment. Use `gh issue edit <number> --body` to append your investigation to the existing body.

            CRITICAL: Before committing, you MUST run these checks and fix any failures:
            1. `npx biome check --write --unsafe .` (Biome lint/format — use --write to auto-fix)
            2. `pnpm test:all` (backend tests + frontend type-check)
            3. After fixing, run `npx biome check .` again to verify zero errors remain
            Do NOT commit or push code that fails these checks. If biome reports errors after --write, manually fix them.

            MANDATORY: After you finish (whether you fixed the issue or not), you MUST post a summary comment on this issue using `gh issue comment`. The comment must include:
            - **What you investigated**: files examined, error patterns found
            - **Root cause**: what is causing the reported problem (or "Unable to determine" with explanation)
            - **What you changed**: list of files modified with brief descriptions (or "No changes made")
            - **PR link**: if you created a PR, include the URL
            - **Why you couldn't fix it**: if applicable, explain what blocked you
            Never finish silently — the developer reviewing this needs a clear trail of what happened.

      - name: Create PR if Claude pushed a branch but didn't open one
        if: |
          github.event_name != 'workflow_dispatch' &&
          steps.feedback-check.outputs.is_feedback == 'true' &&
          always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE_NUM=""
          if [ "${{ github.event_name }}" = "issues" ]; then
            ISSUE_NUM="${{ github.event.issue.number }}"
          elif [ "${{ github.event_name }}" = "issue_comment" ]; then
            ISSUE_NUM="${{ github.event.issue.number }}"
          fi

          if [ -z "$ISSUE_NUM" ]; then
            echo "No issue number found, skipping PR creation"
            exit 0
          fi

          BRANCHES=$(git branch -r --no-merged origin/main | grep -v HEAD | sed 's/origin\///' | xargs)
          for BRANCH in $BRANCHES; do
            COMMIT_MSG=$(git log "origin/$BRANCH" --not origin/main --oneline | head -1)
            if echo "$COMMIT_MSG" | grep -q "#$ISSUE_NUM"; then
              EXISTING_PR=$(gh pr list --head "$BRANCH" --state open --json number -q '.[0].number' 2>/dev/null || echo "")
              if [ -z "$EXISTING_PR" ]; then
                echo "Creating PR for branch $BRANCH (ref #$ISSUE_NUM)"
                ISSUE_TITLE=$(gh issue view "$ISSUE_NUM" --json title -q '.title' 2>/dev/null || echo "Fix for #$ISSUE_NUM")
                PR_TITLE=$(echo "$COMMIT_MSG" | sed 's/^[a-f0-9]* //')
                gh pr create \
                  --head "$BRANCH" \
                  --base main \
                  --title "$PR_TITLE" \
                  --body "$(cat <<EOF
          ## Summary
          Auto-generated PR from feedback fix on issue #$ISSUE_NUM.

          ## Changes
          $(git log "origin/$BRANCH" --not origin/main --format='- %s')

          Ref #$ISSUE_NUM
          EOF
          )" || echo "Failed to create PR for $BRANCH"
              else
                echo "PR #$EXISTING_PR already exists for branch $BRANCH"
              fi
            fi
          done

      - name: Report orphaned branches or failures
        if: |
          github.event_name != 'workflow_dispatch' &&
          steps.feedback-check.outputs.is_feedback == 'true' &&
          always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE_NUM=""
          if [ "${{ github.event_name }}" = "issues" ]; then
            ISSUE_NUM="${{ github.event.issue.number }}"
          elif [ "${{ github.event_name }}" = "issue_comment" ]; then
            ISSUE_NUM="${{ github.event.issue.number }}"
          fi

          if [ -z "$ISSUE_NUM" ]; then
            exit 0
          fi

          CLAUDE_OUTCOME="${{ steps.claude-feedback.outcome }}"

          if [ "$CLAUDE_OUTCOME" = "failure" ]; then
            gh issue comment "$ISSUE_NUM" --repo "${{ github.repository }}" --body "$(cat <<'COMMENT_EOF'
          ## Claude Auto-Fix Failed

          The Claude Code workflow encountered an error while processing this feedback.
          A developer will need to investigate manually.

          **Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMENT_EOF
          )"
          fi

          git fetch origin --prune
          BRANCHES=$(git branch -r --no-merged origin/main | grep -v HEAD | sed 's/origin\///' | xargs)
          for BRANCH in $BRANCHES; do
            COMMIT_MSG=$(git log "origin/$BRANCH" --not origin/main --oneline | head -1)
            if echo "$COMMIT_MSG" | grep -q "#$ISSUE_NUM"; then
              EXISTING_PR=$(gh pr list --head "$BRANCH" --state open --json number -q '.[0].number' 2>/dev/null || echo "")
              if [ -z "$EXISTING_PR" ]; then
                gh issue comment "$ISSUE_NUM" --repo "${{ github.repository }}" --body "$(cat <<WARN_EOF
          ## Warning: Orphaned Branch Detected

          Claude pushed branch \`$BRANCH\` but no PR was created.
          This branch contains fixes for this issue but needs manual PR creation.

          **Branch:** \`$BRANCH\`
          **Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          WARN_EOF
          )"
              fi
            fi
          done

      - name: Run Claude Code (event triggered)
        if: |
          github.event_name != 'workflow_dispatch' &&
          steps.feedback-check.outputs.is_feedback != 'true'
        id: claude-event
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ github.token }}
          claude_args: "--allowedTools Bash,Read,Edit,MultiEdit,Write,Glob,Grep,LS,WebFetch,WebSearch,TodoRead,TodoWrite,Task"
          prompt: |
            Read the CLAUDE.md and agents.md files for project conventions. Follow all existing patterns.

            CRITICAL: Before committing, you MUST run these checks and fix any failures:
            1. `npx biome check --write --unsafe .` (Biome lint/format — use --write to auto-fix)
            2. `pnpm test:all` (backend tests + frontend type-check)
            3. After fixing, run `npx biome check .` again to verify zero errors remain
            Do NOT commit or push code that fails these checks. If biome reports errors after --write, manually fix them.

      - name: Run Claude Code (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        id: claude-dispatch
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ github.token }}
          claude_args: "--allowedTools Bash,Read,Edit,MultiEdit,Write,Glob,Grep,LS,WebFetch,WebSearch,TodoRead,TodoWrite,Task"
          prompt: |
            You are operating autonomously. Do NOT ask questions or request clarification. Make all implementation decisions yourself based on the codebase, existing patterns, and the issue description. If something is ambiguous, pick the most reasonable approach and proceed.

            Read the CLAUDE.md and agents.md files for project conventions. Follow all existing patterns.

            CRITICAL: Before committing, you MUST run these checks and fix any failures:
            1. `npx biome check --write --unsafe .` (Biome lint/format — use --write to auto-fix)
            2. `pnpm test:all` (backend tests + frontend type-check)
            3. After fixing, run `npx biome check .` again to verify zero errors remain
            Do NOT commit or push code that fails these checks. If biome reports errors after --write, manually fix them.

            Your task: implement the following GitHub issue. Create a feature branch, implement all changes, commit, push, and open a PR referencing issue #${{ inputs.issue_number }}.

            ${{ inputs.prompt }}

            ## Issue #${{ inputs.issue_number }}: ${{ steps.issue.outputs.title }}

            ${{ steps.issue.outputs.body }}
