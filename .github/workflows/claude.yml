name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to implement"
        required: true
        type: string
      prompt:
        description: "Instructions for Claude (default: implement the issue)"
        required: false
        type: string
        default: ""

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  merge-feedback-pr:
    if: github.event_name == 'issue_comment' && startsWith(github.event.comment.body, '/merge #')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      checks: read
    steps:
      - name: Validate and merge feedback PR
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ACTOR: ${{ github.actor }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          if echo "$ACTOR" | grep -q '\[bot\]$'; then
            gh issue comment "$ISSUE_NUMBER" --repo "${{ github.repository }}" --body "Merge approval must come from a human user."
            exit 1
          fi

          LABELS=$(gh issue view "$ISSUE_NUMBER" --repo "${{ github.repository }}" --json labels -q '.labels[].name' 2>/dev/null || true)
          if ! echo "$LABELS" | grep -q '^feedback$'; then
            gh issue comment "$ISSUE_NUMBER" --repo "${{ github.repository }}" --body "This merge command only works on feedback tracker issues."
            exit 1
          fi

          PERMISSION=$(gh api repos/${{ github.repository }}/collaborators/${ACTOR}/permission --jq '.permission' 2>/dev/null || echo "none")
          case "$PERMISSION" in
            admin|maintain|write)
              ;;
            *)
              gh issue comment "$ISSUE_NUMBER" --repo "${{ github.repository }}" --body "@${ACTOR} does not have permission to merge feedback PRs."
              exit 1
              ;;
          esac

          PR_NUMBER=$(echo "$COMMENT_BODY" | grep -oE '/merge #[0-9]+' | grep -oE '[0-9]+' | head -1)
          if [ -z "$PR_NUMBER" ]; then
            gh issue comment "$ISSUE_NUMBER" --repo "${{ github.repository }}" --body "Use the format \`/merge #123\`."
            exit 1
          fi

          PR_JSON=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json number,state,url,headRefOid,title,baseRefName)
          PR_STATE=$(echo "$PR_JSON" | jq -r '.state')
          PR_URL=$(echo "$PR_JSON" | jq -r '.url')
          HEAD_SHA=$(echo "$PR_JSON" | jq -r '.headRefOid')
          BASE_REF=$(echo "$PR_JSON" | jq -r '.baseRefName')

          if [ "$PR_STATE" != "OPEN" ]; then
            gh issue comment "$ISSUE_NUMBER" --repo "${{ github.repository }}" --body "PR #${PR_NUMBER} is not open."
            exit 1
          fi

          if [ "$BASE_REF" != "main" ]; then
            gh issue comment "$ISSUE_NUMBER" --repo "${{ github.repository }}" --body "PR #${PR_NUMBER} does not target \`main\`."
            exit 1
          fi

          PR_BODY=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json body --jq '.body')
          if ! printf "%s" "$PR_BODY" | grep -Eq "Ref #${ISSUE_NUMBER}([^0-9]|$)"; then
            gh issue comment "$ISSUE_NUMBER" --repo "${{ github.repository }}" --body "PR #${PR_NUMBER} is not linked to this feedback tracker issue with \`Ref #${ISSUE_NUMBER}\`."
            exit 1
          fi

          CHECKS_JSON=$(gh api repos/${{ github.repository }}/commits/${HEAD_SHA}/check-runs)
          STAGING_OK=$(echo "$CHECKS_JSON" | jq '[.check_runs[] | select(.name == "Deploy to Staging" and .conclusion == "success")] | length')
          FAILED_CHECKS=$(echo "$CHECKS_JSON" | jq '[.check_runs[] | select(.status == "completed" and (.conclusion != "success" and .conclusion != "neutral" and .conclusion != "skipped"))] | length')
          PENDING_CHECKS=$(echo "$CHECKS_JSON" | jq '[.check_runs[] | select(.status != "completed")] | length')

          if [ "$STAGING_OK" -eq 0 ]; then
            gh issue comment "$ISSUE_NUMBER" --repo "${{ github.repository }}" --body "PR #${PR_NUMBER} cannot be merged yet because the staging deployment has not succeeded."
            exit 1
          fi

          if [ "$FAILED_CHECKS" -gt 0 ]; then
            gh issue comment "$ISSUE_NUMBER" --repo "${{ github.repository }}" --body "PR #${PR_NUMBER} cannot be merged because one or more checks are failing."
            exit 1
          fi

          if [ "$PENDING_CHECKS" -gt 0 ]; then
            gh issue comment "$ISSUE_NUMBER" --repo "${{ github.repository }}" --body "PR #${PR_NUMBER} cannot be merged yet because one or more checks are still running."
            exit 1
          fi

          gh pr merge "$PR_NUMBER" --repo "${{ github.repository }}" --squash --delete-branch=false

          gh issue comment "$ISSUE_NUMBER" --repo "${{ github.repository }}" --body "PR #${PR_NUMBER} has been merged by @${ACTOR}.\n\n${PR_URL}"

  claude:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Add eyes reaction
        if: github.event_name == 'issue_comment'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -f content=eyes --silent || true

      - name: Add eyes reaction to issue
        if: github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/reactions \
            -f content=eyes --silent || true

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch issue details
        if: github.event_name == 'workflow_dispatch'
        id: issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE_JSON=$(gh issue view ${{ inputs.issue_number }} --repo ${{ github.repository }} --json title,body)
          TITLE=$(echo "$ISSUE_JSON" | jq -r '.title')
          BODY=$(echo "$ISSUE_JSON" | jq -r '.body')
          {
            echo "title<<ISSUE_EOF"
            echo "$TITLE"
            echo "ISSUE_EOF"
            echo "body<<BODY_EOF"
            echo "$BODY"
            echo "BODY_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Detect feedback issue
        id: feedback-check
        if: github.event_name == 'issues' || github.event_name == 'issue_comment'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE_NUM=""
          if [ "${{ github.event_name }}" = "issues" ]; then
            ISSUE_NUM="${{ github.event.issue.number }}"
          elif [ "${{ github.event_name }}" = "issue_comment" ]; then
            ISSUE_NUM="${{ github.event.issue.number }}"
          fi

          if [ -n "$ISSUE_NUM" ]; then
            LABELS=$(gh issue view "$ISSUE_NUM" --repo "${{ github.repository }}" --json labels -q '.labels[].name' 2>/dev/null || echo "")
            if echo "$LABELS" | grep -q "feedback"; then
              echo "is_feedback=true" >> "$GITHUB_OUTPUT"
              CONTEXT=$(cat .github/FEEDBACK_CONTEXT.md 2>/dev/null || echo "")
              {
                echo "context<<CONTEXT_EOF"
                echo "$CONTEXT"
                echo "CONTEXT_EOF"
              } >> "$GITHUB_OUTPUT"
            else
              echo "is_feedback=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "is_feedback=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Claude Code (feedback issue)
        if: |
          github.event_name != 'workflow_dispatch' &&
          steps.feedback-check.outputs.is_feedback == 'true'
        id: claude-feedback
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ github.token }}
          claude_args: "--allowedTools Bash,Read,Edit,MultiEdit,Write,Glob,Grep,LS,WebFetch,WebSearch,TodoRead,TodoWrite,Task"
          prompt: |
            You are operating autonomously on a feedback issue auto-created from user submissions.

            Read the CLAUDE.md file for project conventions.

            IMPORTANT FEEDBACK CONTEXT:
            ${{ steps.feedback-check.outputs.context }}

            This issue was auto-created from user feedback. The issue body/comment contains:
            - Submitter details and which app they were using
            - The page URL where the problem occurred
            - Screenshots showing the current state of the page
            - AI classification of the feedback type

            CRITICAL: Before committing, you MUST run these checks and fix any failures:
            1. `npx biome check --write --unsafe .`
            2. `pnpm test:all`
            3. `npx biome check .`

            Your task:
            1. Read the feedback content and examine any screenshots in the issue/comment
            2. Use the app context and page URL to locate the relevant code files
            3. Implement the fix completely when it is safely automatable
            4. Create a branch, commit, push, and open a PR to `main` with `Ref #<tracker issue>` in the PR body
            5. Comment on the issue with the PR link and a short summary of what changed

            If the issue is not safely automatable, comment on the issue with the root cause, the exact files involved, what blocked automation, and whether human intervention is needed.

      - name: Report investigation failure
        if: |
          github.event_name != 'workflow_dispatch' &&
          steps.feedback-check.outputs.is_feedback == 'true' &&
          steps.claude-feedback.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE_NUM=""
          if [ "${{ github.event_name }}" = "issues" ]; then
            ISSUE_NUM="${{ github.event.issue.number }}"
          elif [ "${{ github.event_name }}" = "issue_comment" ]; then
            ISSUE_NUM="${{ github.event.issue.number }}"
          fi

          if [ -n "$ISSUE_NUM" ]; then
            gh issue edit "$ISSUE_NUM" --repo "${{ github.repository }}" --add-label needs-human-review || true
            gh issue comment "$ISSUE_NUM" --repo "${{ github.repository }}" --body "$(cat <<'COMMENT_EOF'
          ## Feedback Automation Failed

          The Claude Code workflow could not complete this feedback task automatically.
          The tracker issue has been labeled `needs-human-review`.
          Check the workflow logs for the exact failure reason and rerun after resolving the auth or quota issue, or investigate manually.

          **Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMENT_EOF
          )"
          fi

      - name: Run Claude Code (event triggered)
        if: |
          github.event_name != 'workflow_dispatch' &&
          steps.feedback-check.outputs.is_feedback != 'true'
        id: claude-event
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ github.token }}
          claude_args: "--allowedTools Bash,Read,Edit,MultiEdit,Write,Glob,Grep,LS,WebFetch,WebSearch,TodoRead,TodoWrite,Task"
          prompt: |
            Read the CLAUDE.md and agents.md files for project conventions. Follow all existing patterns.

            CRITICAL: Before committing, you MUST run these checks and fix any failures:
            1. `npx biome check --write --unsafe .` (Biome lint/format — use --write to auto-fix)
            2. `pnpm test:all` (backend tests + frontend type-check)
            3. After fixing, run `npx biome check .` again to verify zero errors remain
            Do NOT commit or push code that fails these checks. If biome reports errors after --write, manually fix them.

      - name: Report event-triggered automation failure
        if: |
          github.event_name == 'issue_comment' &&
          steps.feedback-check.outputs.is_feedback != 'true' &&
          steps.claude-event.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue edit "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --add-label needs-human-review || true
          gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body "$(cat <<'COMMENT_EOF'
          ## Claude Automation Failed

          The Claude Code workflow could not complete this task automatically.
          The issue has been labeled `needs-human-review`.
          Check the workflow logs for the exact failure reason. If the logs show an auth or quota error, rerun after that is resolved.

          **Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMENT_EOF
          )"

      - name: Summarize Claude automation failure
        if: |
          steps.claude-feedback.outcome == 'failure' ||
          steps.claude-event.outcome == 'failure'
        run: |
          {
            echo "## Claude automation did not complete"
            echo
            echo "This workflow was left green so auth or quota issues on the Claude action do not create a hard failing check."
            echo
            echo "Review the logs for the exact error:"
            echo "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run Claude Code (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        id: claude-dispatch
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ github.token }}
          claude_args: "--allowedTools Bash,Read,Edit,MultiEdit,Write,Glob,Grep,LS,WebFetch,WebSearch,TodoRead,TodoWrite,Task"
          prompt: |
            You are operating autonomously. Do NOT ask questions or request clarification. Make all implementation decisions yourself based on the codebase, existing patterns, and the issue description. If something is ambiguous, pick the most reasonable approach and proceed.

            Read the CLAUDE.md and agents.md files for project conventions. Follow all existing patterns.

            CRITICAL: Before committing, you MUST run these checks and fix any failures:
            1. `npx biome check --write --unsafe .` (Biome lint/format — use --write to auto-fix)
            2. `pnpm test:all` (backend tests + frontend type-check)
            3. After fixing, run `npx biome check .` again to verify zero errors remain
            Do NOT commit or push code that fails these checks. If biome reports errors after --write, manually fix them.

            Your task: implement the following GitHub issue. Create a feature branch, implement all changes, commit, push, and open a PR referencing issue #${{ inputs.issue_number }}.

            ${{ inputs.prompt }}

            ## Issue #${{ inputs.issue_number }}: ${{ steps.issue.outputs.title }}

            ${{ steps.issue.outputs.body }}
