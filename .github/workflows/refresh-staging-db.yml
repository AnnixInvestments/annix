name: Refresh staging MongoDB from production

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

concurrency:
  group: refresh-staging-db
  cancel-in-progress: false

jobs:
  refresh:
    if: github.event_name == 'workflow_dispatch' || vars.MONGO_REFRESH_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - name: Validate MongoDB refresh configuration
        env:
          PROD_MONGODB_URI: ${{ secrets.PROD_MONGODB_URI }}
          PROD_MONGO_DATABASE: ${{ secrets.PROD_MONGO_DATABASE }}
          STAGING_MONGODB_URI: ${{ secrets.STAGING_MONGODB_URI }}
          STAGING_MONGO_DATABASE: ${{ secrets.STAGING_MONGO_DATABASE }}
          ORBIT_MONGODB_URI: ${{ secrets.ORBIT_MONGODB_URI }}
        run: |
          set -euo pipefail
          test -n "${PROD_MONGODB_URI}"
          test -n "${PROD_MONGO_DATABASE}"
          test -n "${ORBIT_MONGODB_URI}"
          test -n "${STAGING_MONGODB_URI}"
          test -n "${STAGING_MONGO_DATABASE}"

      - uses: ./.github/actions/setup-monorepo

      - name: Install MongoDB Database Tools
        run: |
          curl -fsSL -o mongodb-database-tools.deb \
            https://fastdl.mongodb.org/tools/db/mongodb-database-tools-ubuntu2204-x86_64-100.10.0.deb
          sudo apt-get update
          sudo apt-get install -y ./mongodb-database-tools.deb
          mongodump --version

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Dump production MongoDB
        env:
          PROD_MONGODB_URI: ${{ secrets.PROD_MONGODB_URI }}
          PROD_MONGO_DATABASE: ${{ secrets.PROD_MONGO_DATABASE }}
        run: mongodump --uri="${PROD_MONGODB_URI}" --db="${PROD_MONGO_DATABASE}" --archive="${RUNNER_TEMP}/production.archive.gz" --gzip

      - name: Scale staging to 0 machines
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl scale count 0 -a annix-app-staging --yes

      - name: Clear staging MongoDB
        env:
          MONGODB_URI: ${{ secrets.STAGING_MONGODB_URI }}
          MONGO_DATABASE: ${{ secrets.STAGING_MONGO_DATABASE }}
        run: pnpm --filter annix-backend exec ts-node --transpile-only scripts/clear-mongo-database.ts

      - name: Restore production MongoDB to staging
        env:
          PROD_MONGO_DATABASE: ${{ secrets.PROD_MONGO_DATABASE }}
          STAGING_MONGODB_URI: ${{ secrets.STAGING_MONGODB_URI }}
          STAGING_MONGO_DATABASE: ${{ secrets.STAGING_MONGO_DATABASE }}
        run: |
          set -euo pipefail
          mongorestore --uri="${STAGING_MONGODB_URI}" --archive="${RUNNER_TEMP}/production.archive.gz" --gzip \
            --nsFrom="${PROD_MONGO_DATABASE}.*" --nsTo="${STAGING_MONGO_DATABASE}.*"

      - name: Refresh staging Orbit DB from production Orbit
        # Annix Orbit lives on its own cluster (see #331), so its data is refreshed
        # separately: copy orbit_production -> orbit_staging on the Orbit cluster.
        # The prod->staging restore above no longer carries Orbit collections because
        # they no longer exist in the core annix_production database.
        env:
          ORBIT_MONGODB_URI: ${{ secrets.ORBIT_MONGODB_URI }}
        run: |
          set -euo pipefail
          mongodump --uri="${ORBIT_MONGODB_URI}" --db=orbit_production \
            --archive="${RUNNER_TEMP}/orbit_production.archive.gz" --gzip
          mongorestore --uri="${ORBIT_MONGODB_URI}" --archive="${RUNNER_TEMP}/orbit_production.archive.gz" --gzip --drop \
            --nsFrom="orbit_production.*" --nsTo="orbit_staging.*"

      - name: Seed staging MongoDB counters
        env:
          MONGODB_URI: ${{ secrets.STAGING_MONGODB_URI }}
          MONGO_DATABASE: ${{ secrets.STAGING_MONGO_DATABASE }}
        run: pnpm --filter annix-backend exec ts-node --transpile-only scripts/seed-mongo-counters.ts

      - name: Scale staging back to 2 machines
        if: always()
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl scale count 2 -a annix-app-staging --yes
