name: Deploy PR to Staging

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  packages: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
  APP_IMAGE: ghcr.io/annixinvestments/annix/app

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Configure git line endings
        run: git config --global core.autocrlf false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Biome check
        run: pnpm biome check .

      - name: Run backend type check
        run: pnpm --filter annix-backend exec tsc --noEmit

      - name: Run backend tests
        run: pnpm --filter annix-backend test

      - name: Run frontend type check
        run: pnpm --filter annix-frontend type-check

  build-image:
    name: Build App Image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.APP_IMAGE }}
          tags: |
            type=raw,value=pr-${{ github.event.pull_request.number }}-${{ github.sha }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=pr-${{ github.event.pull_request.number }}
          cache-to: type=gha,mode=max,scope=pr-${{ github.event.pull_request.number }}

  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-image
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull app image
        run: docker pull ${{ env.APP_IMAGE }}:pr-${{ github.event.pull_request.number }}-${{ github.sha }}

      - name: Setup Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io (staging)
        run: |
          for i in 1 2 3; do
            if flyctl deploy -a annix-app-staging \
              --image ${{ env.APP_IMAGE }}:pr-${{ github.event.pull_request.number }}-${{ github.sha }} \
              --local-only; then
              exit 0
            fi
            echo "Deploy attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "All deploy attempts failed"
          exit 1

      - name: Get Logs on Failure
        if: failure()
        run: flyctl logs -a annix-app-staging --no-tail 2>&1 | tail -100 || echo "Could not fetch logs"

      - name: Comment on PR with staging URL
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUM=${{ github.event.pull_request.number }}
          STAGING_URL="https://annix-app-staging.fly.dev"
          COMMENT_TAG="<!-- staging-deploy-comment -->"
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)

          BODY="${COMMENT_TAG}
          ## Staging Deployment

          **Status:** Deployed
          **URL:** ${STAGING_URL}
          **Commit:** \`${SHORT_SHA}\`
          **Image:** \`pr-${PR_NUM}-${{ github.sha }}\`

          Test this PR on staging before merging to main."

          EXISTING=$(gh pr view "$PR_NUM" --repo "${{ github.repository }}" --json comments \
            --jq ".comments[] | select(.body | contains(\"${COMMENT_TAG}\")) | .id" | head -1)

          if [ -n "$EXISTING" ]; then
            DB_ID=$(gh api graphql -f query="query { node(id: \"${EXISTING}\") { ... on IssueComment { databaseId } } }" \
              --jq '.data.node.databaseId')
            gh api repos/${{ github.repository }}/issues/comments/${DB_ID} -X PATCH -f body="${BODY}"
          else
            gh pr comment "$PR_NUM" --repo "${{ github.repository }}" --body "${BODY}"
          fi

      - name: Comment on linked feedback issues with staging URL
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUM=${{ github.event.pull_request.number }}
          PR_JSON=$(gh pr view "$PR_NUM" --repo "${{ github.repository }}" --json title,body,url)
          PR_TITLE=$(echo "$PR_JSON" | jq -r '.title')
          PR_BODY=$(echo "$PR_JSON" | jq -r '.body')
          PR_URL=$(echo "$PR_JSON" | jq -r '.url')
          STAGING_URL="https://annix-app-staging.fly.dev"

          ISSUE_NUMBERS=$(printf "%s\n%s\n" "$PR_TITLE" "$PR_BODY" | grep -oE '#[0-9]+' | tr -d '#' | sort -u || true)

          for ISSUE_NUM in $ISSUE_NUMBERS; do
            LABELS=$(gh issue view "$ISSUE_NUM" --repo "${{ github.repository }}" --json labels -q '.labels[].name' 2>/dev/null || true)
            if ! echo "$LABELS" | grep -q '^feedback$'; then
              continue
            fi

            COMMENT_TAG="<!-- feedback-staging-pr-${PR_NUM} -->"
            BODY="${COMMENT_TAG}
          ## Feedback Staging Deployment

          A linked PR for this feedback is now available on staging.

          - PR: ${PR_URL}
          - Staging: ${STAGING_URL}
          - Next step: review the PR and merge it normally in GitHub once checks pass and the staging build is approved

          Test the fix on staging before approving merge."

            EXISTING=$(gh api repos/${{ github.repository }}/issues/${ISSUE_NUM}/comments --paginate \
              --jq ".[] | select(.body | contains(\"${COMMENT_TAG}\")) | .id" | head -1)

            if [ -n "$EXISTING" ]; then
              gh api repos/${{ github.repository }}/issues/comments/${EXISTING} -X PATCH -f body="${BODY}"
            else
              gh issue comment "$ISSUE_NUM" --repo "${{ github.repository }}" --body "${BODY}"
            fi
          done
