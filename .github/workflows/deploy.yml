name: Deploy to Fly.io

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environments:
        description: 'Environments to deploy'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - prod
          - test
          - staging

permissions:
  contents: read
  packages: write
  issues: write

env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
  APP_IMAGE: ghcr.io/annixinvestments/annix/app

jobs:
  set-environments:
    name: Set deploy matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          if [ "${{ github.event_name }}" = "push" ] || [ "${{ inputs.environments }}" = "all" ]; then
            echo 'matrix=["prod"]' >> "$GITHUB_OUTPUT"
          elif [ "${{ inputs.environments }}" = "staging" ]; then
            echo 'matrix=["staging"]' >> "$GITHUB_OUTPUT"
          else
            echo 'matrix=["${{ inputs.environments }}"]' >> "$GITHUB_OUTPUT"
          fi

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-monorepo

      - name: Run Biome check
        run: pnpm biome check .

      - name: Run backend type check
        run: pnpm --filter annix-backend exec tsc --noEmit

      - name: Run backend tests
        run: pnpm --filter annix-backend test

      - name: Run frontend type check
        run: pnpm --filter annix-frontend type-check

  build-image:
    name: Build App Image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.APP_IMAGE }}
          tags: |
            type=sha,format=long,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app

  deploy:
    name: Deploy (${{ matrix.environment }})
    runs-on: ubuntu-latest
    needs: [build-image, set-environments]
    environment: ${{ matrix.environment }}
    strategy:
      fail-fast: true
      max-parallel: 3
      matrix:
        environment: ${{ fromJson(needs.set-environments.outputs.matrix) }}
        include:
          - environment: prod
            app_name: annix-app
          - environment: test
            app_name: annix-app-test
          - environment: staging
            app_name: annix-app-staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull app image
        run: docker pull ${{ env.APP_IMAGE }}:${{ github.sha }}

      - name: Setup Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io (${{ matrix.environment }})
        run: |
          for i in 1 2 3; do
            if flyctl deploy -a ${{ matrix.app_name }} \
              --image ${{ env.APP_IMAGE }}:${{ github.sha }} \
              --local-only; then
              exit 0
            fi
            echo "Deploy attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "All deploy attempts failed"
          exit 1

      - name: Get Logs on Failure
        if: failure()
        run: flyctl logs -a ${{ matrix.app_name }} --no-tail 2>&1 | tail -100 || echo "Could not fetch logs"

  notify-failure:
    name: Notify Deploy Failure
    runs-on: ubuntu-latest
    needs: [deploy]
    if: failure()
    steps:
      - name: Create failure issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create deploy-failure --repo "${{ github.repository }}" --color D73A4A --description "Automated deploy failure tracking" 2>/dev/null || true
          EXISTING=$(gh issue list --repo "${{ github.repository }}" --label "deploy-failure" --state open --json number -q '.[0].number' 2>/dev/null || echo "")
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          BODY="## Deploy Failure

          **Commit:** [\`${SHORT_SHA}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
          **Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          **Triggered by:** ${{ github.actor }}
          **Time:** $(date -u +%Y-%m-%dT%H:%M:%SZ)

          The deployment pipeline failed. Check the workflow run for details."

          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --repo "${{ github.repository }}" --body "$BODY"
          else
            gh issue create --repo "${{ github.repository }}" \
              --title "Deploy failure on ${SHORT_SHA}" \
              --label "deploy-failure" \
              --body "$BODY"
          fi
