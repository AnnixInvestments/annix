name: Deploy to Fly.io

on:
  push:
    branches:
      - main
      - pre-main
  workflow_dispatch:
    inputs:
      environments:
        description: 'Environments to deploy'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - prod
          - test
          - staging

permissions:
  contents: read
  packages: write
  issues: write
  pull-requests: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
  APP_IMAGE: ghcr.io/annixinvestments/annix/app

jobs:
  plan:
    name: Plan deploy
    runs-on: ubuntu-latest
    outputs:
      run_staging: ${{ steps.plan.outputs.run_staging }}
      run_promote: ${{ steps.plan.outputs.run_promote }}
      promote_matrix: ${{ steps.plan.outputs.promote_matrix }}
      claim_pr: ${{ steps.plan.outputs.claim_pr }}
    steps:
      - id: plan
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_ENVS: ${{ inputs.environments }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          PROD='{"environment":"prod","app_name":"annix-app"}'
          TEST='{"environment":"test","app_name":"annix-app-test"}'

          HOLDER=$(gh pr list --repo "${{ github.repository }}" --label on-staging --state open --json number --jq '.[0].number')
          [ "$HOLDER" = "null" ] && HOLDER=""

          run_staging=false
          run_promote=false
          promote='[]'

          if [ "$EVENT_NAME" = "push" ] && [ "$REF_NAME" = "pre-main" ]; then
            if [ -n "$HOLDER" ]; then
              echo "::error title=Staging claimed::PR #${HOLDER} holds the \`on-staging\` claim, and experimental pushes deploy ONLY staging. Wait for that PR to release staging (or close it), then push again."
              exit 1
            fi
            run_staging=true
          elif { [ "$EVENT_NAME" = "push" ] && [ "$REF_NAME" = "main" ]; } || { [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$INPUT_ENVS" = "all" ]; }; then
            run_promote=true
            promote="[${PROD},${TEST}]"
            if [ -n "$HOLDER" ]; then
              echo "::warning title=Staging claim held::PR #${HOLDER} holds the \`on-staging\` claim. The staging smoke-test is SKIPPED for this run; prod + test still deploy."
              run_staging=false
            else
              run_staging=true
            fi
          elif [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$INPUT_ENVS" = "staging" ]; then
            run_staging=true
          elif [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$INPUT_ENVS" = "prod" ]; then
            run_promote=true
            promote="[${PROD}]"
          elif [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$INPUT_ENVS" = "test" ]; then
            run_promote=true
            promote="[${TEST}]"
          else
            run_promote=true
            promote="[${PROD}]"
          fi

          {
            echo "run_staging=$run_staging"
            echo "run_promote=$run_promote"
            echo "promote_matrix=$promote"
            echo "claim_pr=$HOLDER"
          } >> "$GITHUB_OUTPUT"
          echo "Plan: run_staging=$run_staging run_promote=$run_promote promote=$promote claim_pr=${HOLDER:-none}"

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-monorepo

      - name: Check migration routing (no Orbit migrations in the core dir)
        run: node scripts/check-migration-routing.ts

      - name: Run Biome check
        run: pnpm biome check .

      - name: Run backend type check
        run: pnpm --filter annix-backend exec tsc --noEmit

      - name: Run backend tests
        run: pnpm --filter annix-backend test

      - name: Run frontend type check
        run: pnpm --filter annix-frontend type-check

  build-image:
    name: Build App Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Fly.io registry
        uses: docker/login-action@v4
        with:
          registry: registry.fly.io
          username: x
          password: ${{ secrets.FLY_API_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.APP_IMAGE }}
          tags: |
            type=sha,format=long,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.tags }}
            registry.fly.io/annix-app:${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=/api
            NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app

  deploy-staging:
    name: Deploy (staging)
    runs-on: ubuntu-latest
    needs: [plan, test, build-image]
    if: needs.plan.outputs.run_staging == 'true'
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io (staging)
        run: |
          for i in 1 2 3; do
            if flyctl deploy -a annix-app-staging \
              --image registry.fly.io/annix-app:${{ github.sha }}; then
              exit 0
            fi
            echo "Deploy attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "All deploy attempts failed"
          exit 1

      - name: Verify app is serving traffic (staging)
        run: |
          URL="https://annix-app-staging.fly.dev/health"
          echo "Probing $URL until healthy..."
          for i in $(seq 1 30); do
            CODE=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "$URL" || echo "000")
            if [ "$CODE" = "200" ]; then
              echo "App healthy after $i attempt(s) (HTTP $CODE)"
              exit 0
            fi
            echo "Attempt $i: HTTP $CODE - not serving yet, retrying in 10s..."
            sleep 10
          done
          echo "App did not return HTTP 200 on /health within timeout - staging deploy is unhealthy"
          exit 1

      - name: Get Logs on Failure
        if: failure()
        run: flyctl logs -a annix-app-staging --no-tail 2>&1 | tail -100 || echo "Could not fetch logs"

  deploy-promote:
    name: Deploy (${{ matrix.environment }})
    runs-on: ubuntu-latest
    needs: [plan, test, build-image, deploy-staging]
    if: >-
      always()
      && needs.plan.outputs.run_promote == 'true'
      && needs.test.result == 'success'
      && needs.build-image.result == 'success'
      && (needs.deploy-staging.result == 'success' || needs.deploy-staging.result == 'skipped')
    strategy:
      fail-fast: true
      max-parallel: 2
      matrix:
        include: ${{ fromJson(needs.plan.outputs.promote_matrix) }}
    environment: ${{ matrix.environment }}
    steps:
      - name: Note skipped staging smoke-test
        if: needs.deploy-staging.result == 'skipped' && needs.plan.outputs.claim_pr != ''
        run: echo "::warning title=Staging smoke-test skipped::Promoted to ${{ matrix.environment }} without a staging smoke-test because PR #${{ needs.plan.outputs.claim_pr }} holds the on-staging claim."

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io (${{ matrix.environment }})
        run: |
          for i in 1 2 3; do
            if flyctl deploy -a ${{ matrix.app_name }} \
              --image registry.fly.io/annix-app:${{ github.sha }}; then
              exit 0
            fi
            echo "Deploy attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "All deploy attempts failed"
          exit 1

      - name: Verify app is serving traffic (${{ matrix.environment }})
        run: |
          URL="https://${{ matrix.app_name }}.fly.dev/health"
          echo "Probing $URL until healthy..."
          for i in $(seq 1 30); do
            CODE=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "$URL" || echo "000")
            if [ "$CODE" = "200" ]; then
              echo "App healthy after $i attempt(s) (HTTP $CODE)"
              exit 0
            fi
            echo "Attempt $i: HTTP $CODE - not serving yet, retrying in 10s..."
            sleep 10
          done
          echo "App did not return HTTP 200 on /health within timeout - deploy is unhealthy"
          exit 1

      - name: Get Logs on Failure
        if: failure()
        run: flyctl logs -a ${{ matrix.app_name }} --no-tail 2>&1 | tail -100 || echo "Could not fetch logs"

  notify-failure:
    name: Notify Deploy Failure
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-promote]
    if: failure() && github.ref == 'refs/heads/main'
    steps:
      - name: Create failure issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create deploy-failure --repo "${{ github.repository }}" --color D73A4A --description "Automated deploy failure tracking" 2>/dev/null || true
          EXISTING=$(gh issue list --repo "${{ github.repository }}" --label "deploy-failure" --state open --json number -q '.[0].number' 2>/dev/null || echo "")
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          BODY="## Deploy Failure

          **Commit:** [\`${SHORT_SHA}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
          **Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          **Triggered by:** ${{ github.actor }}
          **Time:** $(date -u +%Y-%m-%dT%H:%M:%SZ)

          The deployment pipeline failed. Check the workflow run for details."

          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --repo "${{ github.repository }}" --body "$BODY"
          else
            gh issue create --repo "${{ github.repository }}" \
              --title "Deploy failure on ${SHORT_SHA}" \
              --label "deploy-failure" \
              --body "$BODY"
          fi
